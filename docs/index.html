<!DOCTYPE html>
<html lang="en">
<head>

    <!--Esri Leaflet-->
    <script src="https://unpkg.com/esri-leaflet@3.0.19/dist/esri-leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/esri-leaflet-geocoder@3.1.6/dist/esri-leaflet-geocoder.css" crossorigin="">
    <script src="https://unpkg.com/esri-leaflet-geocoder@3.1.6/dist/esri-leaflet-geocoder.js" crossorigin=""></script>
    <script src="https://unpkg.com/esri-leaflet-vector@4.3.2/dist/esri-leaflet-vector.js" crossorigin=""></script>

    <!-- GEOAPIFY LOCATION SCRIPTIÐ-->
    <link rel="stylesheet" href="https://unpkg.com/@geoapify/leaflet-address-search-plugin@^1/dist/L.Control.GeoapifyAddressSearch.min.css" />
    <script src="https://unpkg.com/@geoapify/leaflet-address-search-plugin@^1/dist/L.Control.GeoapifyAddressSearch.min.js"></script>

    <!-- ArcGIS REST JS: request and places -->

    <script src="https://unpkg.com/@esri/arcgis-rest-places@1/dist/bundled/places.umd.js"></script>

    <!-- Calcite components -->
    <script type="module" src="https://js.arcgis.com/calcite-components/3.3.3/calcite.esm.js"></script>
    <link rel="stylesheet" href="https://js.arcgis.com/calcite-components/3.3.3/calcite.css">
    

    <link href="src/output.css" rel="stylesheet">
</head>
<body id="kortið" class="w-screen h-screen m-0 p-0 relative flex flex-col">

    <div id="place-control" class="absolute top-8 superLeft z sm:w-2/5 lg:w-90 visible z">
      <div class="search">
        <calcite-input type="text" id="search-input" placeholder="Type in a place name or category" class="w-full hidden">
          <calcite-button
            kind="inverse"
            icon-start="search"
            id="search-button"
            type="submit"
            slot="action"
          ></calcite-button>
        </calcite-input>
      </div>
    </div>

    <div id="questionMark" class="absolute bottom-15 right-15 z group/lequestion">

        <div class="relative w-full h-full">
            <img src="/build/img/questionmark.png" class="w-10 h-10">
            <span class="w-fit bottom-full left-1/2 -translate-x-1/2 absolute
            invisible group-hover/lequestion:visible
            bg-cyan-400 rounded-lg text-md text-black font-bold
            p-2"
            >ATH! Það gæti vantað einhverjar niðurstöður.</span>
        </div>

    </div>

    <!--<div id="clearMarkersButton" class="absolute left-1 top-1 z">
        <button class="bg-red-600 h-14 w-14 mt-2 ml-1 rounded-2xl cursor-pointer" onclick="clearMarkers()">Clear<br>Markers</button>
    </div>-->
    <div id="infobar" class="bg-white mt-auto w-full h-4 z justify-center flex cursor-default">
        <p> Ef einhverjar upplýsingar eru rangar má endilega senda tölvupóst á agustmar56@gmail.com. Birt með fyrirvara um breytingar</p>
    </div>

    <script src="/build/js/prices.json"></script>
    <script src="/build/js/main.js"></script>
    <script src="/build/js/fastir_markers.js"></script>

</body>
</html>
