<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Le Kort</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <!--Esri Leaflet-->
    <script src="https://unpkg.com/esri-leaflet@3.0.19/dist/esri-leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/esri-leaflet-geocoder@3.1.6/dist/esri-leaflet-geocoder.css" crossorigin="">
    <script src="https://unpkg.com/esri-leaflet-geocoder@3.1.6/dist/esri-leaflet-geocoder.js" crossorigin=""></script>
    <script src="https://unpkg.com/esri-leaflet-vector@4.3.2/dist/esri-leaflet-vector.js" crossorigin=""></script>

    <!-- GEOAPIFY LOCATION SCRIPTIÐ-->
    <link rel="stylesheet" href="https://unpkg.com/@geoapify/leaflet-address-search-plugin@^1/dist/L.Control.GeoapifyAddressSearch.min.css" />
    <script src="https://unpkg.com/@geoapify/leaflet-address-search-plugin@^1/dist/L.Control.GeoapifyAddressSearch.min.js"></script>

    <!-- ArcGIS REST JS: request and places -->
    <script src="https://unpkg.com/@esri/arcgis-rest-request@4/dist/bundled/request.umd.js"></script>
    <script src="https://unpkg.com/@esri/arcgis-rest-places@1/dist/bundled/places.umd.js"></script>

    <!-- Calcite components -->
    <script type="module" src="https://js.arcgis.com/calcite-components/3.3.3/calcite.esm.js"></script>
    <link rel="stylesheet" href="https://js.arcgis.com/calcite-components/3.3.3/calcite.css">
    

    <link href="src/output.css" rel="stylesheet">
</head>
<body id="kortið" class="w-screen h-screen m-0 p-0 relative flex flex-row">
    <div id="place-control" class="absolute top-8 superLeft z sm:w-2/5 lg:w-90 visible z">
      <div class="search">
        <calcite-input type="text" id="search-input" placeholder="Type in a place name or category" class="w-full hidden">
          <calcite-button
            kind="inverse"
            icon-start="search"
            id="search-button"
            type="submit"
            slot="action"
          ></calcite-button>
        </calcite-input>
      </div>
    </div>

    <div id="navBar" class="bg-transparent h-screen flex flex-col justify-center z">

        <div id="places" class="cursor-pointer relative group/addressfinder mt-2 ml-1 ">

            <!--<img src="img/places.svg" class="h-10 mt-1">
            <span class="w-fit absolute top-1/4 left-full
            invisible group-hover/addressfinder:visible
            bg-gray-400 text-black font-bold rounded-3xl p-2
            z text-nowrap ml-1
            ">Address Finder</span>-->

        </div>

        <div id="routing" class="relative cursor-pointer group/routing">

            <!--<img src="img/routing.svg" class="h-10 mt-2 ml-1">
            <span class="w-fit absolute top-1/4 left-full
            invisible group-hover/routing:visible
            bg-gray-400 text-black font-bold rounded-3xl p-2
            z text-nowrap ml-1
            ">Áhugaverðir Staðir</span>-->
        </div>

        <div id="theHolyBible" class="relative group/theHolyBible">
            <a href="https://www.instagram.com/gusti.50cal/" target="_blank" class="bg-transparent h-11/12 w-11/12 absolute mt-2 ml-1 cursor-pointer"></a>
            <img src="/build/img/Instagram_icon.png" class="h-10 mt-2 ml-1 cursor-pointer">
            <span class="w-fit absolute top-1/4 left-full
            invisible group-hover/theHolyBible:visible
            bg-gray-400 text-black font-bold rounded-3xl p-2
            z text-nowrap ml-1
            ">The Holy Bible

            </span>
        </div>

        <div id="clearMarkersButton">
            <button class="bg-red-700 h-14 w-14 absolute mt-2 ml-1 rounded-2xl cursor-pointer" onclick="clearMarkers()">Clear<br>Markers</button>
        </div>

    </div>

    <div id="questionMark" class="absolute bottom-15 right-15 z group/lequestion">

        <div class="relative w-full h-full">
            <img src="/build/img/questionmark.png" class="w-10 h-10">
            <span class="w-fit bottom-full left-1/2 -translate-x-1/2 absolute
            invisible group-hover/lequestion:visible
            bg-cyan-400 rounded-lg text-md text-black font-bold
            p-2"
            >ATH! Það gæti vantað einhverjar niðurstöður.</span>
        </div>

    </div>
    
    <div id="clearLayers" class="absolute h-fit w-1/4 left-3/4 top-1/4 border-2 z">
        <button id="clearOlis" class="bg-red-700 h-14 w-14 mt-2 ml-1 rounded-2xl cursor-pointer">Clear<br>Olís</button>
        <button id="clearN1" class="bg-red-700 h-14 w-14 mt-2 ml-1 rounded-2xl cursor-pointer">Clear<br>N1</button>
        <button id="clearOB" class="bg-red-700 h-14 w-14 mt-2 ml-1 rounded-2xl cursor-pointer">Clear<br>OB</button>
        <button id="clearOrkan" class="bg-red-700 h-14 w-14 mt-2 ml-1 rounded-2xl cursor-pointer">Clear<br>Orkan</button>
        <button id="clearAO" class="bg-red-700 h-14 w-14 mt-2 ml-1 rounded-2xl cursor-pointer">Clear<br>AO</button>

        <button class="bg-red-700 h-14 w-14 mt-2 ml-1 rounded-2xl cursor-pointer" onclick="addOlis()">Add<br>Olís</button>
        <button class="bg-red-700 h-14 w-14 mt-2 ml-1 rounded-2xl cursor-pointer" onclick="addN1()">Add<br>N1</button>
        <button class="bg-red-700 h-14 w-14 mt-2 ml-1 rounded-2xl cursor-pointer" onclick="addOB()">Add<br>OB</button>
        <button class="bg-red-700 h-14 w-14 mt-2 ml-1 rounded-2xl cursor-pointer" onclick="addOrkan()">Add<br>Orkan</button>
        <button class="bg-red-700 h-14 w-14 mt-2 ml-1 rounded-2xl cursor-pointer" onclick="addAO()">Add<br>AO</button>
    </div>


    <script src="/build/js/main.js"></script>
    <script type="module" src="/build/js/fastir_markers.js"></script>
</body>
</html>
